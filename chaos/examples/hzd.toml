[[modifier]]
name = "Aim In Place"
description = "Movement is disabled if aiming"
type = "disable"
groups = [ "movement" ]
applies_to = [ "vertical movement", "horizontal movement" ]
while = [ "aiming" ]

[[modifier]]
name = "No Aiming Camera"
description = "Camera is disabled if aiming"
