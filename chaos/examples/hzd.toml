#---------------------------------------------------------------------------------------------------
# Twitch Controls Chaos (TCC) game configuration file
# Game: Horizon Zero Dawn (PS4)
#
# The settings defined here are those that are required to run a specific game through the Chaos
# engine. The basic settings for the engine itself are controlled in the chaosconfig.toml file.
# The syntax for this file is documented in chaosConfigFiles.md
#
# Note that if you edit this file while the chaos engine is running, you must reload the game
# so the chaos engine can re-read the updated file.
#
# config_file_ver: Version string for the TCC game configuration format.
#---------------------------------------------------------------------------------------------------
config_file_ver = "1.0"

# chaos_toml: Role of this file in the include chain.
chaos_toml = "main"

mod_list = "https://github.com/polysyllabic/chaos/tree/main/chaos/examples/modlists/"

# game: User-friendly name of the game this configuration file defines.
game = "Horizon Zero Dawn (PS4)"

# General controller settings
[controller]
# Default time, in seconds, to hold down a button when issuing a command in a sequence.
button_press_time = 0.0625

# Default time, in seconds, to wait after releasing a button before going on to the next command
# in the sequence.
button_release_time = 0.0625

# Time (in seconds) before the touchpad will be reset to inactive.
touchpad_inactive_delay = 0.02

# If true, use velocity, if false, use distance for calculation
touchpad_velocity = true

# Multiply touchpad value by this factor
touchpad_scale_x = 0.12
touchpad_scale_y = 0.12

# Skew to add to touchpad result
touchpad_skew = 30

#--------------------------------------------------------------------------------------------------
# Modifier defaults
[mod_defaults]
# Number of modifiers simultaneously in effect
active_modifiers = 3
# Lifetime (exclusive of pauses) of an individual modifier, in seconds.
time_per_modifier = 180.0

#--------------------------------------------------------------------------------------------------
# Command Mapping
[[command]]
name = "interact"
binding = "TRIANGLE"

[[command]]
name = "dodge"
binding = "CIRCLE"

[[command]]
name = "jump"
binding = "X"

[[command]]
name = "slide"
binding = "SQUARE"

[[command]]
name = "weapon wheel"
binding = "L1"

[[command]]
name = "aim"
binding = "L2"

[[command]]
name = "light melee"
binding = "R1"

[[command]]
name = "reload" # While aiming
binding = "R1"

[[command]]
name = "heavy melee"
binding = "R2"

[[command]]
name = "shoot" # While aiming
binding = "R2"

[[command]]
name = "sprint"
binding = "L3"

[[command]]
name = "focus"
binding = "R3"

[[command]]
name = "open menu"
binding = "TOUCHPAD"

[[command]]
name = "horizontal movement"
binding = "LX"

[[command]]
name = "vertical movement"
binding = "LY"

[[command]]
name = "horizontal camera"
binding = "RX"

[[command]]
name = "vertical camera"
binding = "RY"

[[command]]
name = "cycle tool"
binding = "DX"

[[command]]
name = "use"
binding = "DY"

[[command]]
name = "menu"
binding = "OPTIONS"

[[command]]
name = "menu right/left"
binding = "DX"

[[command]]
name = "menu up/down"
binding = "DY"

#--------------------------------------------------------------------------------------------------
# Game Conditions
[[condition]]
name = "aiming"
command = [ "aim" ]

[[condition]]
name = "not aiming"
command = [ "aim"]
threshold_type = "below"

[[condition]]
name = "sprinting"
command = [ "sprint" ]

# The basic movement condition is %20 of full deflection. This means the user can get away with
# very slow movement, and also prevents moderate joystick drift from triggering actions.
[[condition]]
name = "movement"
command = [ "vertical movement", "horizontal movement" ]  
threshold = 0.2
threshold_type = "distance"

# Fast movement triggers at 80% of full deflection
[[condition]]
name = "fast movement"
command = [ "vertical movement", "horizontal movement" ]  
threshold = 0.8
threshold_type = "distance"

# The equivalent of 'movement' for the camera joystick
[[condition]]
name = "camera"
command = [ "horizontal camera", "vertical camera" ]  
threshold = 0.2
threshold_type = "distance"

#--------------------------------------------------------------------------------------------------
# Sequences
#
# Zero out all relevant controls. This is used to stop users from whatever they are doing while
# we take control of the controller.
[[sequence]]
name = "disable all"
sequence = [{ event="release", command = "interact" },            # TRIANGLE
            { event="release", command = "dodge" },               # CIRCLE
            { event="release", command = "jump" },                # X
            { event="release", command = "slide" },               # SQUARE
            { event="release", command = "weapon wheel" },        # L1
            { event="release", command = "aim" },              # L2
            { event="release", command = "light melee" },         # R1
            { event="release", command = "heavy melee" },         # R2
            { event="release", command = "sprint" },              # L3
            { event="release", command = "focus" },               # R3
            { event="release", command = "horizontal movement" },       # LX
            { event="release", command = "vertical movement" },   # LY
            { event="release", command = "horizontal camera" },   # RX
            { event="release", command = "vertical camera" },     # RY
            { event="release", command = "cycle tool" },   # DX
            { event="release", command = "use", delay=0.333333 }  # DY
]

# We're not using the menu here, so menu sequences have been removed

#--------------------------------------------------------------------------------------------------
# Menus
# 
# This section defines the game's menu system.
[menu]
use_menu = false
remember_last = true
hide_guarded_items = false

# === Menu Layout ===

layout = [
#      {name = "", type="option", parent="", offset = 0, initialState = 0},
]

#--------------------------------------------------------------------------------------------------
# Gameplay Modifiers
#
# == Disable Modifiers ==
[[modifier]]
name = "No Reload/Shoot"
description = "Can't reload or draw the bow while aiming."
type = "disable"
groups = [ "combat" ]
applies_to = [ "reload", "shoot" ]
while = [ "aiming" ]

[[modifier]]
name = "No Weapon Wheel"
description = "You can't open the weapon wheel"
type = "disable"
groups = [ "combat" ]
applies_to = [ "weapon wheel" ]

[[modifier]]
name = "Hoarder"
description = "Cannot use bombs or traps"
type = "disable"
groups = [ "combat" ]
applies_to = [ "use" ]
filter = "above"

[[modifier]]
name = "Melee Only"
description = "No projectile weapons, and no inventory items"
type = "parent"
groups = [ "combat" ]
children = [ "No Reload/Shoot", "No Weapon Wheel", "Hoarder" ]

[[modifier]]
name = "Literally Melee Only"
description = "Nothing but melee. Literally"
type = "disable"
groups = [ "combat" ]
applies_to = ["interact", "dodge", "jump", "slide", "weapon wheel", "aim", "horizontal movement",
             "vertical movement", "horizontal camera", "vertical camera", "cycle tool", "use"]

[[modifier]]
name = "Pacifist%"
description = "No shooting or melee."
type = "disable"
groups = [ "combat" ]
applies_to = [ "light melee", "heavy melee", "shoot" ]

[[modifier]]
name = "No Jumping"
description = "No climbing or jumping"
type = "disable"
groups = [ "movement" ]
applies_to = [ "jump" ]

[[modifier]]
name = "No Slow-Mo"
description = "No slow motion. Aiming is still allowed."
type = "disable"
groups = [ "combat" ]
applies_to = [ "jump" ]
while = [ "aiming" ]

[[modifier]]
name = "No Multi-Shot"
description = "Double and triple shots are disabled."
type = "disable"
groups = [ "combat" ]
applies_to = [ "reload" ]
while = [ "aiming" ]

[[modifier]]
