applies_to = [ "sprint" ]  
delay = 0.5

[[modifier]]
name = "Aim Delay"
description = "Introduces a 1 second delay to aiming"
type = "delay"
groups = [ "Combat" ]
applies_to = [ "aim" ]  
delay = 1.0

[[modifier]]
name = "Shooting Delay"
description = "Introduces a 0.5 second delay to shooting and throwing"
type = "delay"
groups = [ "Combat" ]
applies_to = [ "shoot" ]  
