#---------------------------------------------------------------------------------------------------
# Twitch Controls Chaos (TCC)
# Configuration file to support a TCC game.
#
# The syntax for this file is documented in chaosConfigFiles.md
#
# This is a shared template that defines features that are common to all variants of the game. It
# is not meant to be loaded directly.
#
# Note that if you edit this file while the chaos engine is running, you must reload the game
# so the chaos engine can re-read the updated file.
#---------------------------------------------------------------------------------------------------
config_file_ver = "1.0"
chaos_toml = "template"

[mod_defaults]
active_modifiers = 3
time_per_modifier = 180.0

[controller]
button_press_time = 0.0625
button_release_time = 0.0625
touchpad_inactive_delay = 0.04
touchpad_velocity = false
touchpad_scale_x = 1.1
touchpad_scale_y = 1.1
touchpad_skew = 30

# Command Map
[[command]]
name = "interact"
binding = "TRIANGLE"

[[command]]
name = "crouch"
binding = "CIRCLE"

[[command]]
name = "deselect" # Alias for backing out of a menu
binding = "CIRCLE"

[[command]]
name = "jump"
binding = "X"

[[command]]
name = "scope" # Alias while aiming
binding = "X"

[[command]]
name = "select" # Alias for selecting a menu option
binding = "X"

[[command]]
name = "melee"
binding = "SQUARE"

[[command]]
name = "shoulder swap" # Alias while aiming
binding = "SQUARE"

[[command]]
name = "sprint"
binding = "L1"

[[command]]
name = "aim"
binding = "L2"

[[command]]
name = "swap/listen"
binding = "R1"

[[command]]
name = "reload/toss"
binding = "R2"

[[command]]
name = "shoot"
binding = "R2"

[[command]]
name = "look"
binding = "L3"

[[command]]
name = "flashlight"
binding = "R3"

[[command]]
name = "backpack"
binding = "TOUCHPAD"

[[command]]
name = "horizontal movement"
binding = "LX"

[[command]]
name = "vertical movement"
binding = "LY"

[[command]]
name = "horizontal camera"
binding = "RX"

[[command]]
name = "vertical camera"
binding = "RY"

[[command]]
name = "select weapon"
binding = "DX"

[[command]]
name = "select consumable"
binding = "DY"

[[command]]
name = "menu"
binding = "OPTIONS"

[[command]]
name = "menu right/left"
binding = "DX"

[[command]]
name = "menu up/down"
binding = "DY"

#--------------------------------------------------------------------------------------------------
# Game Conditions
[[condition]]
name = "aiming"
command = [ "aim" ]

[[condition]]
name = "not aiming"
command = [ "aim"]
threshold_type = "below"

[[condition]]
name = "sprint"
command = [ "sprint" ]

[[condition]]
name = "movement"
command = [ "vertical movement", "horizontal movement" ]  
threshold = 0.2
threshold_type = "distance"

[[condition]]
name = "fast movement"
command = [ "vertical movement", "horizontal movement" ]  
threshold = 0.8
threshold_type = "distance"

[[condition]]
name = "camera"
command = [ "horizontal camera", "vertical camera" ]  
threshold = 0.2
threshold_type = "distance"

[[condition]]
name = "gun selected"
command = [ "select weapon" ]
clear_on = [ "select consumable" ]

[[condition]]
name = "consumable selected"
command = [ "select consumable" ]
clear_on = [ "select weapon" ]

[[condition]]
name = "shooting"
command = [ "aim", "shoot"]

[[condition]]
name = "melee"
command = [ "melee" ]

# Sequences
[[sequence]]
name = "disable all"
sequence = [{ event="release", command = "interact" },            # TRIANGLE
            { event="release", command = "crouch" },              # CIRCLE
            { event="release", command = "jump" },                # X
            { event="release", command = "melee" },               # SQUARE
            { event="release", command = "sprint" },              # L1
            { event="release", command = "aim" },                 # L2
            { event="release", command = "swap/listen" },         # R1
            { event="release", command = "reload/toss" },         # R2
            { event="release", command = "look" },                # L3
            { event="release", command = "flashlight" },          # R3
            { event="release", command = "horizontal movement" }, # LX
            { event="release", command = "vertical movement" },   # LY
            { event="release", command = "horizontal camera" },   # RX
            { event="release", command = "vertical camera" },     # RY
            { event="release", command = "select weapon" },       # DX
            { event="release", command = "select consumable", delay=0.33333 } # DY
]

[[sequence]]
name = "open menu"
sequence = [ { event="press", command = "menu" },
             { event="delay", delay= 0.05 } ]

[[sequence]]
name = "menu select"
sequence = [ { event="press", command = "select" },
             { event="delay", delay= 0.05 } ]

[[sequence]]
name = "menu exit"
sequence = [ { event="press", command = "deselect" },
             { event="delay", delay= 0.05 } ]

[[sequence]]
name = "menu up"
sequence = [ { event="press", command = "menu up/down", value = -1} ]

[[sequence]]
name = "menu down"
sequence = [ { event="press", command = "menu up/down", value = 1} ]

[[sequence]]
name = "option greater"
sequence = [ { event="press", command = "menu right/left", value = 1} ]

[[sequence]]
name = "option less"
sequence = [ { event="press", command = "menu right/left", value = -1} ]

[[sequence]]
name = "confirm"
sequence = [ { event="press", command = "menu right/left", value = -1},
             { event="press", command = "select"} ]

[[sequence]]
name = "tab left"
sequence = [ ]

[[sequence]]
name = "tab right"
sequence = [ ]

